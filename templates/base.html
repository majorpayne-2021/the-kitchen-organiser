<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#c69f73">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Kitchen">
    <title>{% block title %}The Kitchen Organiser{% endblock %}</title>
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/apple-touch-icon.png') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body>
    <nav>
        <div class="nav-inner">
            <a href="{{ url_for('dashboard') }}" class="nav-brand">The Kitchen Organiser <span class="nav-subtitle">Plan, Cook &amp; Gather</span></a>
            <button class="nav-toggle" aria-label="Menu" onclick="this.closest('nav').classList.toggle('open')">&#9776;</button>
            <div class="nav-links">
                <a href="{{ url_for('index') }}" {% if request.endpoint == 'index' %}class="active"{% endif %}>Recipes</a>
                <a href="{{ url_for('ingredient_search') }}" {% if request.endpoint == 'ingredient_search' %}class="active"{% endif %}>What Can I Make?</a>
                <a href="{{ url_for('meal_plan_list') }}" {% if request.endpoint == 'meal_plan_list' %}class="active"{% endif %}>Meal Plans</a>
                <a href="{{ url_for('event_plan_list') }}" {% if request.endpoint == 'event_plan_list' %}class="active"{% endif %}>Event Plans</a>
                <a href="{{ url_for('gift_list') }}" {% if request.endpoint == 'gift_list' %}class="active"{% endif %}>Gift Ideas</a>
            </div>
        </div>
    </nav>

    <main>
        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="flash-messages">
            {% for msg in messages %}
            <p class="flash">{{ msg }}</p>
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>

    <footer>
        <small>The Kitchen Organiser</small>
    </footer>
    <script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js');
    }
    </script>
</body>
</html>
