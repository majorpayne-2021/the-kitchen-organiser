{% extends "base.html" %}
{% block title %}Edit Event Note{% endblock %}

{% block content %}
<a href="{{ url_for('plan_detail', plan_id=note.meal_plan_id) }}" class="back-link">&larr; Back to Event</a>
<div class="page-header">
    <h1>Edit Note</h1>
</div>

<form method="post" class="braindump-form">
    <textarea name="content" rows="5" required>{{ note.content }}</textarea>
    <div class="form-actions">
        <button type="submit">Save</button>
        <a href="{{ url_for('plan_detail', plan_id=note.meal_plan_id) }}" class="btn btn-outline">Cancel</a>
    </div>
</form>
{% endblock %}
